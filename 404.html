<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="https://drive.google.com/u/0/drive-viewer/AKGpihaCWUXVzAoUUwzqeEQLvrX3qXqWfwT0Lkucmll3t8kgwX9lGwDIZsuScTdL1RtVZvqSZ_9HE5CK3SwtACgz5pRddJXWMcOnz5c=s1600-rw-v1?auditContext=forDisplay">
    <title>404 — Anobeass</title>
    <style>
        :root {
            --bg: #F6F6F4;
            --fg: #111111;
            --white: #FFFFFF;
            --base-100: #fafafa;
            --base-200: #e8e6e7;
            --base-300: #d3d2d2;
            --base-400: #0f0f0f;

            --font-display: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --border-thin: 1px solid var(--fg);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-display);
            text-transform: uppercase;
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: var(--fg);
            color: var(--bg);
        }

        /* ── FLOATING MENU ── */
        .menu-drop-zone {
            position: fixed;
            top: 2rem;
            left: 2rem;
            height: calc(3.5rem + 0.7rem);
            border: 0.075rem dashed rgba(0, 0, 0, 0.5);
            border-radius: 4rem;
            transition: opacity 0.2s ease-out;
            pointer-events: none;
            opacity: 0;
            z-index: 999;
        }

        .menu-drawer {
            position: fixed;
            top: 2rem;
            left: 2rem;
            padding: 0.35rem;
            background-color: var(--base-200);
            border-radius: 4rem;
            display: flex;
            align-items: center;
            z-index: 1000;
        }

        .menu-logo {
            width: 4rem;
            height: 3.5rem;
            padding-left: 0.5rem;
            border-radius: 4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .menu-logo img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .menu-items {
            display: flex;
            gap: 0.35rem;
            overflow: hidden;
        }

        .menu-items .menu-item {
            width: max-content;
            height: 3.5rem;
            background-color: var(--base-100);
            border-radius: 4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            opacity: 0;
        }

        .menu-items .menu-item a {
            text-decoration: none;
            color: var(--base-400);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 0 1.5rem;
            user-select: none;
                transition: opacity 0.3s ease;

        }


.menu-items .menu-item:hover a {
    opacity: 0.5;
}

        .menu-toggler {
            position: relative;
            width: 3.5rem;
            height: 3.5rem;
            padding: 1.125rem;
            background-color: var(--base-300);
            border-radius: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.2rem;
            flex-shrink: 0;
            cursor: pointer;
        }

        .menu-toggler span {
            position: relative;
            width: 100%;
            height: 0.125rem;
            background-color: var(--base-400);
            transition: transform 0.3s ease;
            transform-origin: center;
            will-change: transform;
        }

        .menu-toggler.close span:nth-child(1) {
            transform: rotate(45deg) translateX(0.125rem) translateY(0.1rem) scaleX(0.9);
        }

        .menu-toggler.close span:nth-child(2) {
            transform: rotate(-45deg) translateX(0.125rem) translateY(-0.1rem) scaleX(0.9);
        }

        /* ── 404 CONTENT ── */
        .page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .error-number {
            font-size: clamp(8rem, 25vw, 20rem);
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.05em;
            color: var(--fg);
            opacity: 0.08;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            white-space: nowrap;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .stamp-container {
            position: relative;
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stamp-text {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: spin 20s linear infinite;
        }

        .stamp-center {
            width: 40px;
            height: 40px;
            background: var(--fg);
            color: var(--bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .error-label {
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            font-weight: 500;
            color: #888;
            border: var(--border-thin);
            border-color: #ccc;
            border-radius: 50px;
            padding: 0.3em 0.9em;
        }

        .error-title {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .error-desc {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            color: #666;
            line-height: 1.6;
            max-width: 300px;
            font-weight: 500;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--fg);
            opacity: 0.2;
        }

        .actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-solid {
            background: var(--fg);
            color: var(--bg);
            border: none;
            border-radius: 50px;
            padding: 0.8em 1.5em;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-transform: uppercase;
            font-family: var(--font-display);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s ease;
            text-decoration: none;
        }

        .btn-solid:hover { opacity: 0.75; }

        .link-underline {
            text-decoration: none;
            color: var(--fg);
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--fg);
            padding-bottom: 2px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* corner labels */
        .corner-label {
            position: fixed;
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            font-weight: 500;
            color: #aaa;
        }

        .corner-label.bottom-left {
            bottom: 2rem;
            left: 3rem;
        }

        .corner-label.bottom-right {
            bottom: 2rem;
            right: 3rem;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 767px) {
            .menu-drawer { top: 1rem; left: 1rem; }
            .menu-drop-zone { top: 1rem; left: 1rem; height: calc(3rem + 0.7rem); }
            .menu-logo { width: 3rem; }
            .menu-logo img { width: 28px; height: 28px; }
            .menu-toggler { width: 3rem; height: 3rem; }
            .menu-items .menu-item { height: 3rem; }
            .menu-items .menu-item a { padding: 0 1rem; font-size: 0.6rem; }

            .corner-label { display: none; }

            .actions {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- FLOATING MENU -->
    <div class="menu-drop-zone"></div>
    <div class="menu-drawer">
        <div class="menu-logo" onclick="window.location.href='/index.html'">
            <img src="https://drive.google.com/u/0/drive-viewer/AKGpihYAyxGUDznwJslSqmRNHyptbyqgEEZK5ZebIkaXok7NNKAqUJ9pMrd5gG5QyXCTLGd2BtpvZZ_zFEwDbkBxp7SbP5wAk7nQZkE=s2560?auditContext=forDisplay" alt="Logo">
        </div>
        <div class="menu-items">
            <div class="menu-item"><a href="https://anobeass.github.io/Comingsoon/404.html">INDEX</a></div>
            <div class="menu-item"><a href="https://anobeass.github.io/Comingsoon/404.html">PROFILE</a></div>
            <div class="menu-item"><a href="https://anobeass.github.io/Comingsoon/404.html">EXPERTISE</a></div>
            <div class="menu-item"><a href="https://anobeass.github.io/Comingsoon/404.html">ARCHIVE</a></div>
        </div>
        <div class="menu-toggler">
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- BIG 404 BACKGROUND -->
    <div class="error-number">404</div>

    <!-- MAIN CONTENT -->
    <div class="page">
        <div class="content">

            <div class="stamp-container">
                <svg class="stamp-text" viewBox="0 0 100 100">
                    <path id="textPath" d="M 50, 50 m -40, 0 a 40,40 0 1,1 80,0 a 40,40 0 1,1 -80,0" fill="none"></path>
                    <text font-size="8.5" font-weight="600" letter-spacing="0.1em" fill="currentColor">
                        <textPath href="#textPath" startOffset="0%"> Page Not Found  —  Anobeass  —  </textPath>
                    </text>
                </svg>
                <div class="stamp-center">?</div>
            </div>

            <span class="error-label">Error 404</span>

            <h1 class="error-title">Page Not Found</h1>

            <div class="divider"></div>

            <p class="error-desc">
                The page you're looking for doesn't exist or has been moved somewhere else.
            </p>

            <div class="actions">
                <a href="/" class="btn-solid">
                    ← Back to Home
                </a>
                <a href="mailto:anobeassale@gmail.com" class="link-underline">Contact Ano ↗</a>
            </div>

        </div>
    </div>

    <!-- CORNER LABELS -->
    <div class="corner-label bottom-left">Anobeass — Strategic Brand Designer</div>
    <div class="corner-label bottom-right">© 2025 Anobeass</div>

    <!-- GSAP from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
    <script>
        gsap.registerPlugin(Draggable);

        const menuDropZone = document.querySelector(".menu-drop-zone");
        const menuDrawer = document.querySelector(".menu-drawer");
        const menuLogo = document.querySelector(".menu-logo");
        const menuItems = document.querySelector(".menu-items");
        const menuItemElements = document.querySelectorAll(".menu-item");
        const menuToggler = document.querySelector(".menu-toggler");

        let isMenuOpen = false;

        const menuItemsFullWidth = menuItems.scrollWidth;
        const drawerGap = 0.35 * 16;
        const drawerPadding = 0.35 * 16;
        const logoWidth = menuLogo.offsetWidth;
        const togglerWidth = menuToggler.offsetWidth;

        const closedMenuWidth = drawerPadding + logoWidth + drawerGap + togglerWidth + drawerPadding;
        const openMenuWidth = drawerPadding + logoWidth + drawerGap + menuItemsFullWidth + drawerGap + togglerWidth + drawerPadding;

        gsap.set(menuItems, { width: 0, marginRight: 0 });
        gsap.set(menuItemElements, { opacity: 0, scale: 0.85 });
        gsap.set(menuDropZone, { width: closedMenuWidth });

        function toggleMenu() {
            if (isMenuOpen) { closeMenu(); } else { openMenu(); }
            isMenuOpen = !isMenuOpen;
        }

        menuToggler.addEventListener("click", toggleMenu);

        function openMenu() {
            menuToggler.classList.add("close");
            gsap.to(menuItems, {
                width: menuItemsFullWidth, marginRight: drawerGap,
                duration: 0.5, ease: "power3.inOut",
                onStart: () => {
                    gsap.to(menuItemElements, {
                        opacity: 1, scale: 1, duration: 0.3,
                        stagger: 0.05, delay: 0.2, ease: "power3.out",
                    });
                },
            });
        }

        function closeMenu() {
            menuToggler.classList.remove("close");
            gsap.to(menuItems, {
                width: 0, marginRight: 0,
                duration: 0.5, ease: "power3.inOut",
                onStart: () => {
                    gsap.to(menuItemElements, {
                        opacity: 0, scale: 0.85, duration: 0.3,
                        ease: "power3.out", stagger: { each: 0.05, from: "end" },
                    });
                },
            });
        }

        const snapThreshold = 200;

        Draggable.create(menuDrawer, {
            type: "x,y", bounds: window,
            cursor: "grab", activeCursor: "grabbing",
            onDragStart: function () {
                gsap.set(menuDropZone, { width: isMenuOpen ? openMenuWidth : closedMenuWidth });
            },
            onDrag: function () {
                const inSnap = Math.abs(this.x) < snapThreshold && Math.abs(this.y) < snapThreshold;
                gsap.to(menuDropZone, { opacity: inSnap ? 1 : 0, duration: 0.1 });
            },
            onDragEnd: function () {
                gsap.to(menuDropZone, { opacity: 0, duration: 0.1 });
                const inSnap = Math.abs(this.x) < snapThreshold && Math.abs(this.y) < snapThreshold;
                if (inSnap) gsap.to(menuDrawer, { x: 0, y: 0, duration: 0.3, ease: "power2.out" });
            },
        });
    </script>

</body></html>
